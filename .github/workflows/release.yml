name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v1.0.1

permissions:
  contents: write  # Required for creating releases

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and sign plugin
        run: ./gradlew buildPlugin signPlugin
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Resolve plugin artifact
        id: plugin_artifact
        run: |
          unsigned_zip="build/distributions/ClipCode-${{ steps.get_version.outputs.VERSION }}.zip"
          signed_zip="build/distributions/ClipCode-${{ steps.get_version.outputs.VERSION }}-signed.zip"

          if [ -f "$signed_zip" ]; then
            echo "PLUGIN_ZIP=$signed_zip" >> "$GITHUB_OUTPUT"
          elif [ -f "$unsigned_zip" ]; then
            echo "PLUGIN_ZIP=$unsigned_zip" >> "$GITHUB_OUTPUT"
          else
            echo "Plugin artifact not found. Available distributions:" >&2
            find build/distributions -maxdepth 1 -type f -print >&2 || true
            exit 1
          fi

      - name: Extract change notes from patched plugin.xml
        id: changelog
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
        run: |
          # Extract content between <change-notes><![CDATA[ and ]]> and convert HTML to Markdown
          python3 << 'EOF'
          import os
          import re
          from pathlib import Path

          candidates = [
              Path('build/tmp/patchPluginXml/plugin.xml'),
              Path('build/patchedPluginXmlFiles/plugin.xml'),
              Path('build/resources/main/META-INF/plugin.xml'),
          ]
          plugin_xml = next((path for path in candidates if path.exists()), None)
          if plugin_xml is None:
              raise FileNotFoundError("No patched plugin.xml found in known Gradle output locations")

          content = plugin_xml.read_text()
          print(f"Reading change notes from {plugin_xml}")

          # Match content between CDATA start and ]]> (they may be on separate lines)
          match = re.search(r'<change-notes>\s*<!\[CDATA\[(.*?)\]\]>\s*</change-notes>', content, re.DOTALL)
          if match:
              html = match.group(1).strip()

              # Convert HTML to Markdown for GitHub Release
              md = html
              md = re.sub(r'<h2>(.*?)</h2>', r'## \1', md)
              md = re.sub(r'<h3>(.*?)</h3>', r'### \1', md)
              md = re.sub(r'<p><b>(.*?)</b>(.*?)</p>', r'**\1**\2\n', md)
              md = re.sub(r'<p>(.*?)</p>', r'\1\n', md)
              md = re.sub(r'<b>(.*?)</b>', r'**\1**', md)
              md = re.sub(r'<ul>\s*', '\n', md)
              md = re.sub(r'\s*</ul>', '\n', md)
              md = re.sub(r'\s*<li>(.*?)</li>', r'\n- \1', md)
              md = re.sub(r'\n{3,}', '\n\n', md)  # Clean up extra newlines

              Path('changelog.md').write_text(md.strip() + '\n')
              print("Changelog extracted and converted to Markdown successfully")
          else:
              Path('changelog.md').write_text(f"Release v{os.environ['VERSION']}\n")
              print("No changelog found")
          EOF

          echo "--- Changelog content ---"
          cat changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ClipCode v${{ steps.get_version.outputs.VERSION }}
          body_path: changelog.md
          files: ${{ steps.plugin_artifact.outputs.PLUGIN_ZIP }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to JetBrains Marketplace
        run: ./gradlew publishPlugin --rerun-tasks
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
